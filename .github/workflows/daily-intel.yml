name: Daily strategic intelligence

on:
  workflow_dispatch:
  schedule:
    - cron: "23 0 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate collector
        run: npm run check

      - name: Collect public intelligence
        run: npm run collect

      - name: Commit updated intelligence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/intel.json docs/data/archive/*.json
          if git diff --cached --quiet; then
            echo "No intelligence changes to commit."
          else
            git commit -m "chore: update daily strategic intelligence"
            git push
          fi
