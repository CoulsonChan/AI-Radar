<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHJ AI 战略情报雷达</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="shell-header">
    <div class="brand">
      <div class="brand-mark">CHJ</div>
      <div>
        <h1>CHJ AI 战略情报雷达</h1>
        <p>金价 · 竞品官网 · 经营风险 · 战略机会</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="updateTime">等待更新</span>
      <span id="modeLabel">LIVE</span>
    </div>
  </header>

  <main class="shell">
    <section class="top-grid" aria-label="关键指标">
      <article class="gold-card">
        <span>实时金价</span>
        <strong id="goldPrice">读取中</strong>
        <p id="goldMeta">优先读取实时行情，失败时显示每日采集兜底价。</p>
      </article>

      <article>
        <span>今日情报</span>
        <strong id="totalItems">-</strong>
        <p>去重后进入看板</p>
      </article>
      <article>
        <span>风险指数</span>
        <strong id="riskIndex">-</strong>
        <p>金价、库存、加盟、经营压力</p>
      </article>
      <article>
        <span>机会指数</span>
        <strong id="opportunityIndex">-</strong>
        <p>新品、出海、品牌资产</p>
      </article>
    </section>

    <section class="brief" id="briefBox" hidden>
      <h2>董事长简报</h2>
      <p id="briefText"></p>
    </section>

    <section class="toolbar" aria-label="操作">
      <button id="briefBtn" class="primary" type="button">生成简报</button>
      <button id="refreshBtn" class="secondary" type="button">刷新数据</button>
      <span id="sourceStatus">加载中</span>
    </section>

    <nav class="tabs" aria-label="情报分类">
      <button class="tab active" type="button" data-filter="all">全部</button>
      <button class="tab" type="button" data-filter="竞品观察">竞品观察</button>
      <button class="tab" type="button" data-filter="战略机会">战略机会</button>
      <button class="tab" type="button" data-filter="经营风险">经营风险</button>
      <button class="tab" type="button" data-filter="出海机会">出海机会</button>
      <button class="tab" type="button" data-filter="资本市场">资本市场</button>
    </nav>

    <section class="layout">
      <div>
        <div class="section-title">
          <h2>最新情报信号</h2>
          <p>优先展示需要董事长助理跟进的信号。</p>
        </div>
        <div id="signals" class="cards"></div>
      </div>

      <aside>
        <div class="side-card">
          <h2>竞品官方来源</h2>
          <div id="officialCompetitors" class="official-list"></div>
        </div>
        <div class="side-card">
          <h2>董事长本周可追问</h2>
          <ol id="questions"></ol>
        </div>
        <div class="side-card">
          <h2>下周行动清单</h2>
          <ul id="actions"></ul>
        </div>
      </aside>
    </section>

    <footer>
      本网站基于公开网络情报自动生成，正式经营决策前必须人工复核，并结合公司内部销售、库存、会员、渠道和财务数据。
    </footer>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
