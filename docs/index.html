<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CHJ AI 战略情报雷达</title>
  <link rel="stylesheet" href="./assets/styles.css?v=20260720-2">
</head>
<body>
  <header class="shell-header">
    <div class="brand">
      <div class="brand-mark">CHJ</div>
      <div>
        <h1>CHJ AI 战略情报雷达</h1>
        <p>国内金价 · 品牌官网新品 · 7 日情报趋势</p>
      </div>
    </div>
    <div class="header-meta">
      <span id="updateTime">等待更新</span>
      <span id="modeLabel">LIVE</span>
    </div>
  </header>

  <main class="shell">
    <section class="market-grid" aria-label="黄金行情">
      <article class="market-primary">
        <div class="market-heading">
          <div>
            <span class="eyebrow">国内金价</span>
            <h2>上金所 Au99.99</h2>
          </div>
          <span class="live-status"><i></i>每 60 秒刷新</span>
        </div>
        <div class="primary-quote">
          <strong id="goldPrice">读取中</strong>
          <span id="goldChange" class="quote-change">--</span>
        </div>
        <p id="goldMeta">正在读取最新行情</p>
        <div id="goldSparkline" class="sparkline" aria-label="Au99.99 日内走势"></div>
      </article>

      <aside class="market-secondary" aria-labelledby="secondaryMarketTitle">
        <div class="market-heading compact">
          <div>
            <span class="eyebrow">辅助行情</span>
            <h2 id="secondaryMarketTitle">国内与国际参考</h2>
          </div>
        </div>
        <div id="goldSecondary" class="secondary-quotes"></div>
        <p class="market-note">国际金价仅作方向参考，国内业务以人民币/克口径为主。</p>
      </aside>
    </section>

    <section class="chart-grid" aria-label="情报看板">
      <article class="chart-panel">
        <div class="chart-heading">
          <div>
            <span class="eyebrow">外部信息</span>
            <h2>7 日情报量</h2>
          </div>
          <strong id="intelTotal">-</strong>
        </div>
        <div id="intelTrendChart" class="trend-chart" aria-label="最近七日情报量折线图"></div>
      </article>

    </section>

    <section class="products-section" aria-labelledby="productsTitle">
      <div class="section-title products-title">
        <div>
          <h2 id="productsTitle">品牌上新</h2>
          <p id="productStatus">读取品牌官网新品</p>
        </div>
        <div id="productFilters" class="product-filters" aria-label="品牌筛选"></div>
      </div>
      <div id="products" class="product-grid"></div>
    </section>

    <footer>
      金价为公开延时行情，网页约每 60 秒刷新；新品信息来自品牌官网。正式经营决策前仍需人工复核，并结合公司内部销售、库存和渠道数据。
    </footer>
  </main>

  <script src="./assets/app.js?v=20260720-2"></script>
</body>
</html>
